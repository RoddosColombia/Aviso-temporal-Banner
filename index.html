<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RODDOS - Estamos mejorando para ti</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }
    img {
      display: block;
      width: 100%;
      height: 100vh;
      object-fit: cover;
      object-position: center;
    }
    @media (max-width: 768px) {
      img {
        object-fit: contain;
        height: 100vh;
        background: #000;
      }
    }
  </style>
</head>
<body>
  <img
    src="banner.png"
    alt="RODDOS - Estamos actualizando nuestro sitio web"
  />
</body>
</html>
